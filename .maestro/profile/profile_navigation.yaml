appId: com.the360ghar.ghar360
---
# Preferences
- runFlow: ../_shared/login.yaml
- tapOn:
    id: qa.dashboard.nav.profile
- tapOn:
    id: qa.profile.menu.preferences
- extendedWaitUntil:
    visible:
      id: qa.profile.preferences.screen
    timeout: 15000
- assertVisible:
    id: qa.profile.preferences.theme_selector
- assertVisible:
    id: qa.profile.preferences.language_selector

# Privacy
- runFlow: ../_shared/login.yaml
- tapOn:
    id: qa.dashboard.nav.profile
- scrollUntilVisible:
    element:
      id: qa.profile.menu.privacy
- tapOn:
    id: qa.profile.menu.privacy
- extendedWaitUntil:
    visible:
      id: qa.profile.privacy.screen
    timeout: 15000
- assertVisible:
    id: qa.profile.privacy.change_password

# Help -> Feedback
- runFlow: ../_shared/login.yaml
- tapOn:
    id: qa.dashboard.nav.profile
- scrollUntilVisible:
    element:
      id: qa.profile.menu.help
- tapOn:
    id: qa.profile.menu.help
- extendedWaitUntil:
    visible:
      id: qa.profile.help.screen
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Send Feedback"
- tapOn:
    text: "Send Feedback"
- extendedWaitUntil:
    visible:
      id: qa.profile.feedback.screen
    timeout: 15000
- assertVisible:
    text: "Send Feedback"

# About
- runFlow: ../_shared/login.yaml
- tapOn:
    id: qa.dashboard.nav.profile
- scrollUntilVisible:
    element:
      id: qa.profile.menu.about
- tapOn:
    id: qa.profile.menu.about
- extendedWaitUntil:
    visible:
      id: qa.profile.about.screen
    timeout: 15000
