appId: com.the360ghar.ghar360
---
# Area Converter
- runFlow: ../_shared/login.yaml
- tapOn:
    id: qa.dashboard.nav.profile
- tapOn:
    id: qa.profile.menu.tools
- assertVisible:
    id: qa.tools.menu.area_converter
- tapOn:
    id: qa.tools.menu.area_converter
- extendedWaitUntil:
    visible:
      id: qa.tools.area_converter.screen
    timeout: 10000

# Loan Eligibility
- runFlow: ../_shared/login.yaml
- tapOn:
    id: qa.dashboard.nav.profile
- tapOn:
    id: qa.profile.menu.tools
- scrollUntilVisible:
    element:
      text: "Loan"
- tapOn:
    text: "Loan"
- extendedWaitUntil:
    visible:
      id: qa.tools.loan_eligibility.screen
    timeout: 10000

