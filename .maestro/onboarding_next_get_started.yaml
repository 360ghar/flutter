appId: com.the360ghar.ghar360
---
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: "Tour Homes In 360° Before You Visit"
- tapOn: "Next"
- extendedWaitUntil:
    visible: "Trust Every Listing You Swipe"
    timeout: 15000
- tapOn: "Next"
- extendedWaitUntil:
    visible: "Low Brokerage. High-Trust Execution."
    timeout: 15000
- assertVisible: "Get Started"
- tapOn: "Get Started"
- extendedWaitUntil:
    visible: "Enter your mobile number"
    timeout: 15000
