appId: com.the360ghar.ghar360
---
- runFlow: ../_shared/launch_clean.yaml
- runFlow: ../_shared/skip_onboarding.yaml
- runFlow:
    when:
      visible:
        id: qa.auth.login.password_input
    commands:
      - tapOn: "Change"
- extendedWaitUntil:
    visible:
      id: qa.auth.phone_entry.phone_input
    timeout: 20000
- tapOn:
    id: qa.auth.phone_entry.phone_input
- inputText: "${TEST_PHONE}"
- tapOn:
    id: qa.auth.phone_entry.continue
- extendedWaitUntil:
    visible:
      id: qa.auth.login.password_input
    timeout: 20000
- tapOn:
    id: qa.auth.login.forgot_password
- extendedWaitUntil:
    visible:
      id: qa.auth.forgot_password.send_otp
    timeout: 15000
- tapOn:
    id: qa.auth.forgot_password.send_otp
- assertVisible: "Please enter your phone number"
